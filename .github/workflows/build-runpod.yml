name: Build & Push RunPod Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.runpod'
      - 'runpod_app.py'
      - 'requirements-runpod.txt'
      - 'start.sh'
      - 'download_model.py'
      - '.github/workflows/build-runpod.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: oct7/flux-klein-tryon-runpod

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 512
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Free additional disk space
        run: |
          sudo rm -rf /usr/share/swift /usr/local/julia* /usr/share/dotnet
          sudo rm -rf /usr/local/share/powershell /usr/local/share/chromium
          sudo rm -rf /usr/local/lib/node_modules
          sudo apt-get autoremove -y && sudo apt-get clean
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.runpod
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          no-cache: true
