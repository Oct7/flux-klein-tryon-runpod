name: Build & Push RunPod Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.runpod'
      - 'runpod_app.py'
      - 'requirements-runpod.txt'
      - 'start.sh'
      - 'download_model.py'
      - '.github/workflows/build-runpod.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: oct7/flux-klein-tryon-runpod

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /usr/local/share/boost /usr/share/swift /usr/local/julia*
          sudo rm -rf /usr/local/share/powershell /usr/local/share/chromium
          sudo rm -rf /usr/local/lib/node_modules /opt/hostedtoolcache
          sudo docker image prune -af
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' '^mongodb-.*' '^mysql-.*' \
            azure-cli google-cloud-sdk google-chrome-stable firefox powershell mono-devel \
            --fix-missing 2>/dev/null || true
          sudo apt-get autoremove -y && sudo apt-get clean
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.runpod
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            HF_TOKEN=${{ secrets.HF_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
